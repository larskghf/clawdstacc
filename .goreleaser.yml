version: 2

project_name: clawdstacc

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: clawdstacc
    main: ./cmd/clawdstacc
    binary: bin/clawdstacc
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: clawdstacc
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: ['tar.gz']
    # Bundle the binary plus everything a user needs on a clean Mac.
    # Templates and HTML are embedded in the binary via go:embed; no need to
    # ship duplicates in the archive. The Homebrew formula's `etc.install`
    # picks up clawdstacc.conf.example from this tarball.
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - clawdstacc.conf.example
      - install.sh
      - docs/**/*

# Homebrew tap — GoReleaser auto-generates Formula/clawdstacc.rb on every
# tagged release and pushes it to larskghf/homebrew-tap. Users then:
#   brew tap larskghf/tap
#   brew install clawdstacc
#
# The PAT in HOMEBREW_TAP_GITHUB_TOKEN needs `contents: write` on the tap
# repo. See README → "Install" for the user-facing one-liner.
brews:
  - name: clawdstacc
    repository:
      owner: larskghf
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/larskghf/clawdstacc"
    description: "Self-hosted Codespaces for Claude Code, on your own Mac"
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore: bump clawdstacc to {{ .Tag }}"
    dependencies:
      - name: tmux
      - name: code-server
    install: |
      bin.install "bin/clawdstacc"
      # Stash the conf example under HOMEBREW_PREFIX/etc/clawdstacc/ so users
      # can copy it without hunting for the source tarball later.
      (etc/"clawdstacc").install "clawdstacc.conf.example"
    test: |
      assert_match "clawdstacc", shell_output("#{bin}/clawdstacc version")
    caveats: |
      clawdstacc also needs the Claude Code CLI (not on brew):
        curl -fsSL https://claude.com/install.sh | bash

      First-time setup — the first `clawdstacc setup` writes
      ~/.config/clawdstacc/clawdstacc.conf from the bundled defaults and
      exits. Review it, then re-run:
        clawdstacc setup
        $EDITOR ~/.config/clawdstacc/clawdstacc.conf
        clawdstacc setup

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: 'New features'
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: 'Bug fixes'
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: 'Documentation'
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^chore:'
      - '^test:'
      - '^ci:'
      - 'merge conflict'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch

release:
  github:
    owner: larskghf
    name: clawdstacc
  prerelease: auto
  header: |
    ## clawdstacc {{ .Tag }}

    Self-hosted Codespaces for Claude Code, on your own Mac.

    ### Install

    ```bash
    brew tap larskghf/tap
    brew install clawdstacc
    ```

    Or grab the archive below for a manual install.
  footer: |
    **Full Changelog**: https://github.com/larskghf/clawdstacc/compare/{{ .PreviousTag }}...{{ .Tag }}
