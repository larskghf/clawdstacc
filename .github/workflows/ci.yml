name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go (vet · gofmt · test · build)
    # Build on both runners — clawdstacc targets macOS in production but the
    # code itself stays portable; running tests on Linux catches accidental
    # darwin-only assumptions early.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: go.sum

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files need gofmt -s:"
            echo "$unformatted"
            exit 1
          fi

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o /tmp/clawdstacc ./cmd/clawdstacc

  shellcheck:
    name: ShellCheck (install.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck install.sh
