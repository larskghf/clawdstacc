# clawdstacc tmux configuration.
#
# This file is loaded onto a dedicated tmux server socket called "clawdstacc"
# (`tmux -L clawdstacc`). It does NOT touch your personal ~/.tmux.conf or
# the default-server config used by your interactive `tmux` invocations.
#
# To attach to a clawdstacc session by hand:
#   clawdstacc tmux attach -t <project>
#
# To see what's running:
#   clawdstacc tmux ls

# Use the user's preferred shell for new windows/panes, started as a login
# shell so things like Oh My Zsh, theme, aliases load.
set -g default-command "${SHELL:-/bin/sh} -l"

# True-color support — matters for many shell themes.
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Mouse support (scroll, drag-resize panes).
set -g mouse on
bind m set -g mouse \; display "mouse: #{?mouse,on,off}"

# Clipboard via OSC 52 — when accessed through code-server's xterm.js,
# tmux's selected text gets written to the *browser's* clipboard (i.e. your
# laptop), not pbcopy on the Mac mini. Without this, mouse-drag selections
# vanish on release because tmux captures the drag but has nowhere to put
# the text.
set -g set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\7'
set -as terminal-features ',*:clipboard'
bind -T copy-mode    MouseDragEnd1Pane send -X copy-selection-no-clear
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear

# Disable tmux's right-click pane menu so the host UI's menu (e.g. VSCode's
# context menu in a code-server terminal) shows up instead.
unbind -n MouseDown3Pane
unbind -n MouseDown3Status
unbind -n MouseDown3StatusLeft

# Larger scrollback buffer.
set -g history-limit 50000

# Window/pane indices start at 1 (closer to the keyboard).
set -g base-index 1
setw -g pane-base-index 1
