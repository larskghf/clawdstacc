{{define "index"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0e0e1c">
<meta name="description" content="clawdstacc — persistent, remote-controllable Claude Code sessions, all in one place.">
<meta property="og:title" content="clawdstacc">
<meta property="og:description" content="Live status of every Claude Code session running on the host.">
<meta property="og:type" content="website">
<title>clawdstacc</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://rsms.me/">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
  :root {
    --bg: #06060c;
    --bg-soft: #0c0c18;
    --card: rgba(255, 255, 255, 0.03);
    --card-hover: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.07);
    --border-strong: rgba(255, 255, 255, 0.12);

    --text: #f4f4f8;
    --text-soft: #c8c8d4;
    --muted: #7a7a92;
    --muted-strong: #9a9ab2;

    --acc-cyan: #06b6d4;
    --acc-violet: #a855f7;
    --acc-pink: #ec4899;
    --acc-grad: linear-gradient(135deg, #06b6d4 0%, #a855f7 50%, #ec4899 100%);

    --ok: #22c55e;
    --ok-soft: rgba(34, 197, 94, 0.12);
    --warn: #f59e0b;
    --warn-soft: rgba(245, 158, 11, 0.12);
    --err: #ef4444;
    --err-soft: rgba(239, 68, 68, 0.12);
    --info: #38bdf8;
    --info-soft: rgba(56, 189, 248, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    background: var(--bg);
    background-image:
      radial-gradient(circle at 12% 8%, rgba(168, 85, 247, 0.12), transparent 35%),
      radial-gradient(circle at 88% 90%, rgba(6, 182, 212, 0.10), transparent 40%);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: 1.5rem 1.25rem 4rem;
  }

  .wrap { max-width: 1280px; margin: 0 auto; }

  /* === Header === */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap;
  }
  .brand {
    display: flex; align-items: center; gap: .65rem;
    font-size: 1.55rem; font-weight: 700; letter-spacing: -0.03em;
  }
  .brand .icon {
    width: 32px; height: 32px;
    filter: drop-shadow(0 4px 14px rgba(168, 85, 247, 0.35));
  }
  .brand .logo {
    background: var(--acc-grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-feature-settings: "ss02";
  }
  .brand .pill {
    font-size: .66rem; font-weight: 500; letter-spacing: .04em;
    padding: 3px 9px; border-radius: 99px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted-strong); text-transform: uppercase;
    align-self: center;
  }
  .live-indicator {
    display: flex; align-items: center; gap: .55rem;
    font-size: .78rem; color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }

  /* === Paste-target picker === */
  .paste-picker {
    display: flex; align-items: center; gap: .45rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: .35rem .6rem .35rem .85rem;
    font-size: .76rem;
    color: var(--muted-strong);
    transition: border-color .2s ease;
  }
  .paste-picker:focus-within { border-color: rgba(34, 197, 94, 0.4); }
  .paste-picker label {
    cursor: pointer; user-select: none; line-height: 1;
  }
  .paste-picker select {
    appearance: none; -webkit-appearance: none;
    font: inherit; color: var(--text);
    background: transparent; border: 0; padding: 0 .9rem 0 .25rem;
    cursor: pointer;
    background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%),
                      linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: calc(100% - 8px) 50%, calc(100% - 4px) 50%;
    background-size: 4px 4px;
    background-repeat: no-repeat;
  }
  .paste-picker select:focus { outline: none; }
  .paste-picker select option { background: var(--bg-soft); color: var(--text); }
  .paste-picker .hint { color: var(--muted); font-size: .68rem; }
  .card.paste-target {
    border-color: rgba(34, 197, 94, 0.4);
    box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.12);
    background: rgba(34, 197, 94, 0.02);
  }
  .card.paste-target::after {
    content: "paste";
    position: absolute; top: -1px; right: 14px;
    background: rgba(34, 197, 94, 0.85);
    color: #fff;
    font-size: .54rem; font-weight: 600;
    letter-spacing: .05em;
    padding: 2px 7px;
    border-radius: 0 0 6px 6px;
    pointer-events: none;
  }

  /* === Confirm modal — replaces the native browser confirm() popup that
        htmx fires for hx-confirm. Uses the platform <dialog> element so we
        get proper modal semantics, ESC-to-cancel, and focus trap for free. */
  .modal {
    border: none;
    border-radius: 14px;
    background: var(--card);
    color: var(--text);
    max-width: 460px;
    width: calc(100vw - 2rem);
    padding: 1.4rem 1.6rem 1.2rem;
    box-shadow: 0 24px 80px rgba(0,0,0,0.55), 0 0 0 1px var(--border);
    font: inherit;
    /* Center on screen — native <dialog> default centering is unreliable
       across browsers when custom padding/sizing is set. */
    inset: 0;
    margin: auto;
  }
  .modal::backdrop {
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(3px);
  }
  .modal[open] {
    animation: modal-in .14s ease-out;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: translateY(6px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }
  .modal-title {
    margin: 0 0 .55rem;
    font-size: 1rem; font-weight: 650; letter-spacing: -0.01em;
  }
  .modal-msg {
    margin: 0 0 1.25rem;
    font-size: .85rem; line-height: 1.55;
    color: var(--muted-strong);
    white-space: pre-line;
  }
  .modal-actions {
    display: flex; gap: .5rem; justify-content: flex-end;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #444; transition: all .25s ease;
  }
  .live-dot.on {
    background: var(--ok);
    box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18); }
    50%      { box-shadow: 0 0 0 7px rgba(34, 197, 94, 0.04); }
  }

  /* === Summary stats === */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: .75rem;
    margin-bottom: 1.75rem;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: .85rem 1rem;
    display: flex; flex-direction: column; gap: .15rem;
    transition: all .2s ease;
  }
  .stat:hover { background: var(--card-hover); border-color: var(--border-strong); }
  .stat-num { font-size: 1.7rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  .stat-label {
    font-size: .7rem; font-weight: 500; text-transform: uppercase;
    letter-spacing: .06em; color: var(--muted);
  }
  .stat.accent .stat-num {
    background: var(--acc-grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat.ok-color .stat-num { color: var(--ok); }
  .stat.warn-color .stat-num { color: var(--warn); }
  .stat.info-color .stat-num { color: var(--info); }

  /* === Cards grid === */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: .85rem;
  }

  .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.1rem 1.15rem 1rem;
    overflow: hidden;
    transition: all .2s ease;
    isolation: isolate;
  }
  .card::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.025), transparent 40%);
    pointer-events: none; z-index: -1;
  }
  .card.dead { opacity: .55; }
  .card.setup {
    border-style: dashed;
    border-color: rgba(56, 189, 248, 0.35);
    background: rgba(56, 189, 248, 0.04);
  }

  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: .65rem; margin-bottom: .55rem;
    flex-wrap: wrap;
  }
  .card-name {
    font-size: 1.05rem; font-weight: 650; letter-spacing: -0.015em;
    /* Allow ellipsis truncation in a flex container — needs min-width: 0 to
       opt out of the default flex-basis-as-min-content sizing. */
    flex: 1 1 0; min-width: 0;
    display: flex; align-items: center;
    overflow: hidden;
  }
  .card-name-text {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-name .name-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: .45rem; vertical-align: middle;
    background: var(--muted);
  }
  .card.ok    .name-dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .card.warn  .name-dot { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .card.dead  .name-dot { background: var(--err); }
  .card.setup .name-dot { background: var(--info); }
  .card.running .name-dot {
    background: var(--acc-violet);
    box-shadow: 0 0 10px var(--acc-violet);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1);   opacity: 1;   }
    50%      { transform: scale(1.4); opacity: .65; }
  }

  .badges { display: flex; gap: .3rem; flex-wrap: wrap; justify-content: flex-end; }
  .b {
    display: inline-flex; align-items: center; gap: .25rem;
    font-size: .66rem; font-weight: 500;
    padding: 2px 7px; border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted-strong);
    letter-spacing: .03em;
  }
  .b.ok   { background: var(--ok-soft); color: #86efac; border-color: rgba(34,197,94,0.2); }
  .b.warn { background: var(--warn-soft); color: #fcd34d; border-color: rgba(245,158,11,0.2); }
  .b.err  { background: var(--err-soft); color: #fca5a5; border-color: rgba(239,68,68,0.2); }
  .b.info { background: var(--info-soft); color: #7dd3fc; border-color: rgba(56,189,248,0.2); }

  .meta-line {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: .4rem; gap: .5rem;
  }
  .meta {
    font-size: .73rem; color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .sess-line {
    margin: .55rem 0 .65rem;
    color: var(--text-soft);
    background: rgba(255,255,255,0.025);
    border-left: 2px solid var(--border-strong);
    padding: .45rem .65rem;
    border-radius: 0 8px 8px 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: .73rem;
  }
  .sess-line.empty { color: var(--muted); font-style: italic; }
  .sess-line.tool-running {
    border-left-color: var(--acc-violet);
    background: linear-gradient(90deg, rgba(168,85,247,0.10), rgba(168,85,247,0.02) 60%);
    color: #f0abfc;
  }
  .tool-prefix { color: var(--acc-violet); font-weight: 600; margin-right: .25rem; }

  .card-stats {
    display: flex; align-items: center; gap: .9rem; flex-wrap: wrap;
    margin: 0 0 .85rem;
    font-size: .72rem; color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .card-stats strong { color: var(--text-soft); font-weight: 600; }
  .card-stats .cost strong {
    background: var(--acc-grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .b.model {
    background: rgba(56, 189, 248, 0.10);
    border-color: rgba(56, 189, 248, 0.25);
    color: #7dd3fc;
    font-weight: 600;
  }

  .path-meta {
    max-width: 60%;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    direction: rtl; text-align: left; /* keep tail visible when truncated */
  }

  .actions { display: flex; gap: .4rem; flex-wrap: wrap; }
  .btn {
    font: inherit;
    font-size: .76rem; font-weight: 500;
    color: var(--text-soft);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    padding: .42rem .75rem; border-radius: 8px;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: .35rem;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .btn:hover {
    background: rgba(255,255,255,0.06);
    border-color: var(--border-strong);
    color: var(--text);
  }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.primary {
    background: var(--acc-grad);
    color: white; border: 0;
    font-weight: 600;
  }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn.danger { color: #fca5a5; border-color: rgba(239,68,68,0.2); }
  .btn.danger:hover { background: var(--err-soft); border-color: rgba(239,68,68,0.4); color: #fca5a5; }

  /* === Setup CTA — same shape as other action buttons, amber-tinted for
        attention without screaming "primary"-loud. ===  */
  .btn.setup-cta {
    color: #fde68a;
    background: rgba(245, 158, 11, 0.10);
    border: 1px solid rgba(245, 158, 11, 0.30);
    font-weight: 600;
  }
  .btn.setup-cta:hover {
    background: rgba(245, 158, 11, 0.20);
    border-color: rgba(245, 158, 11, 0.55);
    color: #fef3c7;
  }
  .btn.setup-cta .setup-cta-icon {
    display: inline-block;
    font-size: .95rem; line-height: 1;
    margin-right: .25rem;
    vertical-align: -1px;
  }

  .footer {
    margin-top: 2.5rem; text-align: center;
    color: var(--muted); font-size: .72rem;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .footer a { color: var(--muted-strong); }
  .footer a:hover { color: var(--text); }

  .toast {
    position: fixed; bottom: 1.25rem; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: rgba(15, 15, 25, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: .65rem 1.1rem; border-radius: 10px;
    border: 1px solid var(--border-strong);
    font-size: .82rem;
    opacity: 0; pointer-events: none;
    transition: all .25s ease;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok  { border-left: 3px solid var(--ok); padding-left: 1rem; }
  .toast.err { border-left: 3px solid var(--err); padding-left: 1rem; }

  @media (max-width: 600px) {
    body { padding: 1rem .9rem 3rem; }
    .brand { font-size: 1.3rem; }
    .stat-num { font-size: 1.4rem; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <img class="icon" src="/icon.svg" alt="" width="32" height="32">
      <span class="logo">clawdstacc</span>
      <span class="pill">live</span>
    </div>
    <div class="paste-picker" title="Cmd+V/Ctrl+V anywhere on the page sends an image to this project">
      <label for="paste-target">📋 paste to</label>
      <select id="paste-target">
        <option value="" disabled selected>—</option>
      </select>
    </div>
    <div class="live-indicator">
      <span class="live-dot" id="live-dot"></span>
      <span id="live-text">connecting…</span>
    </div>
  </header>

  <div hx-ext="sse" sse-connect="/sse/status">
    <div class="stats" id="stats" sse-swap="stats" hx-swap="innerHTML">
      {{template "stats" summary .StatusSnapshot}}
    </div>
    <div class="cards" id="cards" sse-swap="cards" hx-swap="innerHTML">
      {{template "cards" .}}
    </div>
  </div>

  <div class="footer">
    refresh streams every 2s · <a href="/api/status">/api/status</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<dialog class="modal" id="confirm-modal" aria-labelledby="confirm-title">
  <h3 class="modal-title" id="confirm-title">Confirm</h3>
  <p class="modal-msg" id="confirm-msg"></p>
  <div class="modal-actions">
    <button type="button" class="btn" id="confirm-cancel">Cancel</button>
    <button type="button" class="btn" id="confirm-ok">Confirm</button>
  </div>
</dialog>

<script>
  // Liveness derived from message receipt: any SSE message in the last 8s
  // means we're live. This is more reliable than HTMX's open/close events
  // which can fire spuriously around message swaps and reconnects.
  const liveDot = document.getElementById("live-dot");
  const liveText = document.getElementById("live-text");
  let lastMessageAt = 0;
  function setLive() {
    liveDot.classList.add("on");
    liveText.textContent = "live";
  }
  function setOffline() {
    liveDot.classList.remove("on");
    liveText.textContent = "offline";
  }
  document.body.addEventListener("htmx:sseMessage", () => {
    lastMessageAt = Date.now();
    setLive();
  });
  setInterval(() => {
    if (lastMessageAt && Date.now() - lastMessageAt > 8000) setOffline();
  }, 1000);

  function toast(msg, kind) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show " + (kind || "ok");
    clearTimeout(t._h);
    t._h = setTimeout(() => t.className = "toast", 2500);
  }

  document.body.addEventListener("htmx:afterRequest", (ev) => {
    const path = ev.detail.requestConfig?.path || "";
    if (path.startsWith("/api/restart/")) {
      const name = decodeURIComponent(path.split("/").pop());
      toast(ev.detail.successful ? "restart sent: " + name : "restart failed", ev.detail.successful ? "ok" : "err");
    }
    if (path.startsWith("/api/setup/")) {
      const name = decodeURIComponent(path.split("/").pop());
      toast(ev.detail.successful ? "set up: " + name : "setup failed", ev.detail.successful ? "ok" : "err");
    }
    if (path.startsWith("/api/remove/")) {
      const name = decodeURIComponent(path.split("/").pop());
      toast(ev.detail.successful ? "removed: " + name : "remove failed", ev.detail.successful ? "ok" : "err");
    }
  });

  // === Confirm modal — intercept htmx:confirm to replace native confirm() ===
  const confirmModal  = document.getElementById("confirm-modal");
  const confirmTitle  = document.getElementById("confirm-title");
  const confirmMsg    = document.getElementById("confirm-msg");
  const confirmOk     = document.getElementById("confirm-ok");
  const confirmCancel = document.getElementById("confirm-cancel");

  // Map api path → human-friendly title + confirm-button label.
  const confirmPresets = {
    setup:   { title: "Set up project",  ok: "Set up",  danger: false },
    restart: { title: "Restart session", ok: "Restart", danger: false },
    remove:  { title: "Remove agent",    ok: "Remove",  danger: true  },
  };

  let pendingConfirm = null;

  document.body.addEventListener("htmx:confirm", (ev) => {
    ev.preventDefault();
    const path = ev.detail.path || "";
    const m = path.match(/\/api\/(\w+)\//);
    const preset = (m && confirmPresets[m[1]]) || { title: "Confirm", ok: "Confirm", danger: false };
    confirmTitle.textContent = preset.title;
    confirmMsg.textContent   = ev.detail.question || "";
    confirmOk.textContent    = preset.ok;
    confirmOk.classList.toggle("danger", preset.danger);
    pendingConfirm = ev.detail;
    confirmModal.showModal();
    // Default focus on Cancel — safer for destructive actions.
    confirmCancel.focus();
  });

  confirmOk.addEventListener("click", () => {
    const d = pendingConfirm;
    pendingConfirm = null;
    confirmModal.close();
    if (d) d.issueRequest(true);
  });
  confirmCancel.addEventListener("click", () => {
    pendingConfirm = null;
    confirmModal.close();
  });
  // ESC + backdrop click both fire `cancel` on <dialog>; clear pending state.
  confirmModal.addEventListener("cancel", () => { pendingConfirm = null; });
  confirmModal.addEventListener("click", (ev) => {
    // Click on the backdrop (outside the dialog content) closes the modal.
    if (ev.target === confirmModal) {
      pendingConfirm = null;
      confirmModal.close();
    }
  });

  // === Paste-target picker + page-level image paste ===
  //
  // Visual highlight (.paste-target class on the matching card) is rendered
  // server-side: setTarget() writes a cookie, and the SSE handler reads it at
  // connect time to thread `PasteTarget` through to the cards template. The
  // class is therefore baked into every cards-payload htmx swaps in, no JS
  // re-apply needed. Cookies are fixed for the lifetime of an EventSource —
  // when the user changes target we reload the page so the server captures
  // the new value.
  //
  // The JS below only manages the picker <select> (option list mirrors live
  // cards) and the code-server-click shortcut.
  const STORAGE_KEY = "clawdstacc.pasteTarget";
  const targetSelect = document.getElementById("paste-target");

  function getTarget() {
    return localStorage.getItem(STORAGE_KEY) || "";
  }
  function setTarget(name) {
    if (!name) return;
    const prev = getTarget();
    localStorage.setItem(STORAGE_KEY, name);
    document.cookie = `clawdstacc-paste-target=${encodeURIComponent(name)};path=/;max-age=31536000;samesite=lax`;
    if (name === prev) return;

    // Move the visual highlight immediately on every card so the user sees
    // the change before the next SSE push lands. Server-side rendering will
    // re-confirm it once the new SSE connection (with the new cookie) opens.
    document.querySelectorAll(".card[id^='card-']").forEach((c) => {
      c.classList.toggle("paste-target", c.id === "card-" + name);
    });

    // Server reads the cookie at SSE connect time. To pick up the new value
    // we tear down + re-initialise the htmx-sse element so a fresh
    // EventSource opens with the updated cookie. Cleaner UX than a full
    // page reload.
    reconnectSSE();
  }

  function reconnectSSE() {
    const wrapper = document.querySelector('[hx-ext~="sse"]');
    if (!wrapper || typeof htmx === "undefined") return;
    // htmx 1.9 stows internal state on a per-element property keyed
    // "htmx-internal-data" — that's where the sse extension parks the
    // EventSource. Closing + nulling lets htmx.process recreate it on the
    // next pass with whatever cookies the document now has.
    const data = wrapper["htmx-internal-data"];
    if (data && data.sseEventSource) {
      data.sseEventSource.close();
      data.sseEventSource = null;
      // initHash is the digest htmx uses to short-circuit re-init on the
      // same element; clearing it forces a real re-process.
      data.initHash = null;
    }
    htmx.process(wrapper);
  }

  function refreshPasteTargetOptions() {
    const cards = document.querySelectorAll(".card[id^='card-']");
    const live = [];
    cards.forEach((c) => {
      const name = c.id.replace(/^card-/, "");
      if (c.classList.contains("ok") || c.classList.contains("running")) {
        live.push(name);
      }
    });

    // Rebuild options off-screen and swap atomically — never leave the select
    // empty (would race with anything that reads targetSelect.value).
    const frag = document.createDocumentFragment();
    if (live.length === 0) {
      const opt = document.createElement("option");
      opt.value = ""; opt.disabled = true; opt.selected = true;
      opt.textContent = "no live sessions";
      frag.appendChild(opt);
    } else {
      live.forEach((name) => {
        const opt = document.createElement("option");
        opt.value = name; opt.textContent = name;
        frag.appendChild(opt);
      });
    }
    targetSelect.replaceChildren(frag);

    const stored = getTarget();
    if (live.length > 0) {
      if (stored && live.includes(stored)) {
        targetSelect.value = stored;
      } else {
        // First-ever load with no stored target: pick the first live one and
        // set it. Reload happens via setTarget so the server picks it up.
        targetSelect.value = live[0];
        if (!stored) setTarget(live[0]);
      }
    }
  }

  targetSelect.addEventListener("change", () => setTarget(targetSelect.value));

  // Click on a card's "code-server ↗" link → make that project the paste
  // target. Mirrors the user's likely intent ("the project I'm about to open
  // is the one I'll paste screenshots into").
  document.addEventListener("click", (ev) => {
    const link = ev.target.closest("a.btn[href]");
    if (!link || !/code-server/i.test(link.textContent)) return;
    const card = link.closest(".card[id^='card-']");
    if (!card) return;
    setTarget(card.id.replace(/^card-/, ""));
  });

  // Re-populate options after every SSE swap (live-session set may change).
  document.body.addEventListener("htmx:afterSwap", refreshPasteTargetOptions);
  // Initial population.
  setTimeout(refreshPasteTargetOptions, 100);

  // Page-level paste handler: image-only, requires a target.
  window.addEventListener("paste", async (ev) => {
    const target = targetSelect.value;
    if (!target) return;

    const items = ev.clipboardData?.items;
    if (!items) return;

    let blob = null;
    let ext = "png";
    for (const item of items) {
      if (item.type.startsWith("image/")) {
        blob = item.getAsFile();
        ext = item.type.split("/")[1] || "png";
        break;
      }
    }
    if (!blob) return; // No image — let default text paste behaviour proceed.
    ev.preventDefault();

    const fd = new FormData();
    fd.append("image", blob, "pasted." + ext);

    try {
      const r = await fetch("/api/paste/" + encodeURIComponent(target), {
        method: "POST",
        body: fd,
      });
      const d = await r.json();
      if (d.ok) {
        const kb = (d.bytes / 1024).toFixed(1);
        toast(`📋 → ${target} · ${kb} kB`);
      } else {
        toast("paste failed: " + d.error, "err");
      }
    } catch (e) {
      toast("paste failed: " + e, "err");
    }
  });
</script>
</body>
</html>{{end}}
